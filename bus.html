<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rathnayaka Super Line | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --accent: #00a2ff;
            --leyland-red: #e63946;
            --bg: #050505;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- LOADING SCREEN (MOBILE FRIENDLY) --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; text-align: center;
        }

        .loader-bar {
            position: absolute; width: 100%; height: 2px; background: var(--accent);
            left: -100%; animation: bar-slide 2.5s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }
        .bar-top { top: 35%; }
        .bar-bottom { bottom: 35%; background: #fff; animation-delay: 0.2s; }

        .loader-content h2 {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            letter-spacing: 8px; color: #fff; font-size: 1.2rem;
            animation: text-glow 2s ease-in-out infinite alternate;
            padding: 0 15px;
        }

        @keyframes bar-slide {
            0% { left: -100%; } 50% { left: 0; width: 100%; } 100% { left: 100%; width: 0; }
        }

        .loaded #loader-wrapper { opacity: 0; pointer-events: none; transition: 1s; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), var(--bg)), url('20221226_140852.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        .welcome-box {
            background: var(--glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); padding: 40px 20px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 800px; text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 900; text-transform: uppercase; line-height: 0.9;
        }

        .tagline {
            font-family: 'Syncopate', sans-serif; font-size: 0.6rem;
            letter-spacing: 6px; color: var(--accent); margin-bottom: 20px; display: block;
        }

        .turbo-badge {
            margin-top: 20px; display: inline-block; background: var(--leyland-red);
            padding: 6px 15px; font-family: 'Oswald', sans-serif;
            font-style: italic; letter-spacing: 2px; font-size: 1.1rem; border-radius: 4px;
        }

        /* --- PHOTO GALLERY (RESPONSIVE GRID) --- */
        .section-title {
            text-align: center; padding: 60px 0 30px;
            font-family: 'Syncopate', sans-serif; letter-spacing: 8px;
            color: var(--accent); font-size: 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; padding: 0 20px 60px;
        }

        .gallery-item {
            border-radius: 20px; overflow: hidden; height: 300px;
            background: #111; border: 1px solid rgba(255,255,255,0.05);
        }

        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- FOOTER --- */
        footer { background: #080808; padding: 60px 20px; text-align: center; }
        .phone { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-top: 10px; }
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .social-icons a { color: #fff; font-size: 1.8rem; }

        /* --- SCROLL REVEAL --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- PC SPECIFIC ADJUSTMENTS --- */
        @media (min-width: 992px) {
            .welcome-box { padding: 60px; border-radius: 50px; }
            .tagline { font-size: 0.8rem; letter-spacing: 12px; }
            .gallery-grid { padding: 0 10% 100px; gap: 25px; }
            .section-title { font-size: 1.2rem; letter-spacing: 12px; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-bar bar-top"></div>
        <div class="loader-content"><h2>RATHNAYAKA SUPER LINE</h2></div>
        <div class="loader-bar bar-bottom"></div>
    </div>

    <section class="hero">
        <div class="welcome-box reveal">
            <span class="tagline">ASHOK LEYLAND POWER</span>
            <h1>Rathnayaka<br><span style="color: var(--accent);">Super Line</span></h1>
            <div class="turbo-badge">TURBO INTERCOOLER</div>
            <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.6; letter-spacing: 4px;">
                MEEGALEWA | GALGAMUWA | 419
            </p>
        </div>
    </section>

    <h2 class="section-title reveal">COLLECTION</h2>
    <div class="gallery-grid">
        <div class="gallery-item reveal"><img src="20221226_140852.jpg"></div>
        <div class="gallery-item reveal"><img src="20221226_140947.jpg"></div>
        <div class="gallery-item reveal"><img src="20221226_141020.jpg"></div>
        <div class="gallery-item reveal"><img src="20221226_141153.jpg"></div>
        <div class="gallery-item reveal"><img src="20220811_181824.jpg"></div>
    </div>

    <footer class="reveal">
        <p style="opacity: 0.5; font-size: 0.8rem; letter-spacing: 3px;">GET IN TOUCH</p>
        <p class="phone">+94 72 4021 429</p>
        <div class="social-icons">
            <a href="https://wa.me/94722472939" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://web.facebook.com/rathnayakasuperline" target="_blank"><i class="fab fa-facebook-f"></i></a>
        </div>
        <p style="margin-top: 40px; opacity: 0.2; font-size: 0.6rem; letter-spacing: 3px;">
            DESIGNED BY ARUNA PRAMOD
        </p>
    </footer>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.body.classList.add('loaded');
                handleScroll();
            }, 2500);
        });

        function handleScroll() {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(reveal => {
                const windowHeight = window.innerHeight;
                const revealTop = reveal.getBoundingClientRect().top;
                if (revealTop < windowHeight - 50) {
                    reveal.classList.add('active');
                }
            });
        }
        window.addEventListener('scroll', handleScroll);
    </script>
</body>
</html>
